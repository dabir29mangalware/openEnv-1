name: data_cleaner
version: "2.0.0"
description: "Automated Data Cleaner - An RL environment for training AI agents to clean messy real-world datasets"
type: custom
tags: [openenv]
tasks:
  - id: data_cleaning_easy
    difficulty: easy
    grader:
      type: deterministic
      endpoint: /grader
  - id: data_cleaning_medium
    difficulty: medium
    grader:
      type: deterministic
      endpoint: /grader
  - id: data_cleaning_hard
    difficulty: hard
    grader:
      type: deterministic
      endpoint: /grader
commands:
  start: "uvicorn src.envs.data_cleaner.server.app:app --host 0.0.0.0 --port 8000"
  inference: "python inference.py"
